<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1780 720"
     font-family="Inter, -apple-system, system-ui, sans-serif">

  <!-- Board background -->
  <rect width="1780" height="720" fill="#FAFAFA" rx="8"/>

  <!-- Board title -->
  <text x="40" y="48" font-size="20" font-weight="700" fill="#111827">
    Wireframe Board  Navigator E2E flow
  </text>
  <text x="40" y="72" font-size="13" fill="#6B7280">
    Module: core | Persona: Template user | Generated by /wireframe
  </text>
  <line x1="40" y1="90" x2="1740" y2="90" stroke="#E5E7EB" stroke-width="1"/>

  <!-- ==================== Screen 1: Navigator (home) ==================== -->
  <g transform="translate(40, 110)">
    <rect width="800" height="500" fill="#FFFFFF" rx="4" stroke="#D1D5DB" stroke-width="1"/>

    <!-- Topbar -->
    <rect width="800" height="48" fill="#9CA3AF" rx="4 4 0 0"/>
    <text x="16" y="30" font-size="12" font-weight="600" fill="#FFFFFF">Design Os</text>
    <rect x="120" y="12" width="90" height="24" fill="#E5E7EB" rx="4"/>
    <text x="135" y="28" font-size="11" fill="#374151">Prototyper</text>
    <rect x="218" y="12" width="90" height="24" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
    <text x="238" y="28" font-size="11" fill="#374151">Navigator</text>
    <rect x="680" y="12" width="108" height="24" fill="none" stroke="#111827" stroke-width="2" rx="4"/>
    <text x="698" y="28" font-size="11" font-weight="600" fill="#111827">Launch console</text>

    <!-- Main: flow graph area -->
    <g transform="translate(24, 64)">
      <rect width="752" height="360" fill="#F9FAFB" rx="4" stroke="#D1D5DB" stroke-width="0.5"/>
      <text x="16" y="24" font-size="11" fill="#6B7280">Flow graph (nodes + edges)</text>
      <!-- Simplified nodes -->
      <rect x="80" y="60" width="100" height="56" fill="#F3F4F6" rx="4" stroke="#D1D5DB"/>
      <text x="130" y="92" font-size="10" fill="#6B7280" text-anchor="middle">Material</text>
      <rect x="220" y="60" width="100" height="56" fill="#F3F4F6" rx="4" stroke="#D1D5DB"/>
      <text x="270" y="92" font-size="10" fill="#6B7280" text-anchor="middle">Discovery</text>
      <rect x="360" y="60" width="100" height="56" fill="#F3F4F6" rx="4" stroke="#D1D5DB"/>
      <text x="410" y="92" font-size="10" fill="#6B7280" text-anchor="middle">UX</text>
      <rect x="500" y="60" width="100" height="56" fill="#F3F4F6" rx="4" stroke="#D1D5DB"/>
      <text x="550" y="92" font-size="10" fill="#6B7280" text-anchor="middle">Spec</text>
      <rect x="640" y="60" width="100" height="56" fill="#F3F4F6" rx="4" stroke="#D1D5DB"/>
      <text x="690" y="92" font-size="10" fill="#6B7280" text-anchor="middle">Build</text>
    </g>

    <!-- Footer: readiness -->
    <rect x="0" y="432" width="800" height="68" fill="#F3F4F6" rx="0 0 4 4" stroke="#D1D5DB" stroke-width="0.5"/>
    <text x="16" y="458" font-size="11" fill="#6B7280">AI  Material Æ Discovery Æ UX Æ Spec Æ Build Æ Review</text>
    <rect x="16" y="468" width="200" height="8" fill="#E5E7EB" rx="4"/>
    <text x="230" y="475" font-size="11" fill="#374151">80% Ę 12 nodes Ę 2 files</text>
  </g>

  <!-- Arrow: Select node Æ Panel opens -->
  <g transform="translate(860, 350)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#6B7280" stroke-width="1.5"/>
    <polygon points="60,-5 72,0 60,5" fill="#6B7280"/>
    <text x="30" y="-12" font-size="10" fill="#6B7280" text-anchor="middle">Select node</text>
  </g>

  <!-- ==================== Screen 2: Navigator + Node detail panel ==================== -->
  <g transform="translate(940, 110)">
    <rect width="800" height="500" fill="#FFFFFF" rx="4" stroke="#D1D5DB" stroke-width="1"/>

    <!-- Same topbar -->
    <rect width="800" height="48" fill="#9CA3AF" rx="4 4 0 0"/>
    <text x="16" y="30" font-size="12" font-weight="600" fill="#FFFFFF">Design Os</text>
    <rect x="120" y="12" width="90" height="24" fill="#E5E7EB" rx="4"/>
    <rect x="218" y="12" width="90" height="24" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1" rx="4"/>
    <text x="238" y="28" font-size="11" fill="#374151">Navigator</text>
    <rect x="680" y="12" width="108" height="24" fill="none" stroke="#111827" stroke-width="2" rx="4"/>
    <text x="698" y="28" font-size="11" font-weight="600" fill="#111827">Launch console</text>

    <!-- Main: flow graph (narrower, panel open) -->
    <rect x="24" y="64" width="476" height="360" fill="#F9FAFB" rx="4" stroke="#D1D5DB" stroke-width="0.5"/>
    <text x="40" y="84" font-size="11" fill="#6B7280">Flow graph</text>

    <!-- Right panel: Node detail panel -->
    <rect x="500" y="48" width="300" height="452" fill="#F9FAFB" rx="0 0 4 0" stroke="#D1D5DB" stroke-width="1"/>
    <text x="516" y="72" font-size="12" font-weight="600" fill="#374151">Ū UX Design</text>
    <text x="776" y="72" font-size="16" fill="#6B7280">ū</text>
    <!-- Status -->
    <text x="516" y="100" font-size="10" fill="#9CA3AF">STATUS</text>
    <text x="516" y="118" font-size="11" fill="#374151">Maturity: Empty Ę Files: 0 Ę Gates: 0/4</text>
    <!-- Actions -->
    <text x="516" y="148" font-size="10" fill="#9CA3AF">ACTIONS</text>
    <rect x="516" y="156" width="268" height="36" fill="none" stroke="#111827" stroke-width="2" rx="4"/>
    <text x="530" y="178" font-size="11" fill="#111827">Check coherence&</text>
    <!-- Files -->
    <text x="516" y="218" font-size="10" fill="#9CA3AF">FILES</text>
    <rect x="516" y="226" width="268" height="28" fill="#F3F4F6" rx="4" stroke="#D1D5DB"/>
    <text x="530" y="244" font-size="10" fill="#6B7280">resume.md</text>
    <!-- Connections -->
    <text x="516" y="272" font-size="10" fill="#9CA3AF">CONNECTIONS</text>
    <text x="516" y="290" font-size="11" fill="#6B7280">É Discovery Ę Æ Spec Ę Æ UI Design</text>

    <!-- Footer -->
    <rect x="0" y="432" width="800" height="68" fill="#F3F4F6" rx="0 0 4 4" stroke="#D1D5DB" stroke-width="0.5"/>
    <text x="16" y="458" font-size="11" fill="#6B7280">Readiness</text>
    <text x="230" y="475" font-size="11" fill="#374151">80% Ę 12 nodes</text>
  </g>

  <!-- Arrow back: Close panel -->
  <g transform="translate(940, 620)">
    <line x1="400" y1="0" x2="400" y2="-50" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4,4"/>
    <polygon points="400,-58 395,-50 405,-50" fill="#9CA3AF"/>
    <text x="400" y="-68" font-size="10" fill="#6B7280" text-anchor="middle">Close panel</text>
  </g>

  <!-- Screen labels -->
  <text x="440" y="622" font-size="11" fill="#6B7280" text-anchor="middle">Navigator (home)  main view  Template user</text>
  <text x="1340" y="622" font-size="11" fill="#6B7280" text-anchor="middle">Node detail panel  side panel  Template user</text>

  <!-- Legend -->
  <g transform="translate(40, 670)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#374151">Legend:</text>
    <rect x="80" y="-10" width="48" height="20" fill="none" stroke="#111827" stroke-width="2" rx="4"/>
    <text x="135" y="2" font-size="10" fill="#6B7280">CTA</text>
    <rect x="200" y="-10" width="60" height="20" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.5" rx="4"/>
    <text x="270" y="2" font-size="10" fill="#6B7280">Content zone</text>
    <line x1="350" y1="0" x2="380" y2="0" stroke="#6B7280" stroke-width="1.5"/>
    <polygon points="380,-4 388,0 380,4" fill="#6B7280"/>
    <text x="365" y="-8" font-size="10" fill="#6B7280" text-anchor="middle">Navigation</text>
  </g>
</svg>
